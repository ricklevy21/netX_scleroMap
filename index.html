<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f9f9f7; color: #222; }
  #app { max-width: 960px; margin: 0 auto; padding: 16px; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #2c2c2a; }
  #status { font-size: 13px; color: #666; margin-bottom: 10px; min-height: 18px; }
  #map { width: 100%; height: 480px; border-radius: 8px; border: 1px solid #ddd; }
  #panel { display: none; margin-top: 12px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
  #panel.open { display: block; }
  .panel-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .panel-meta { font-size: 12px; color: #666; margin-bottom: 10px; }
  .panel-coords { font-size: 12px; font-family: monospace; color: #444; margin-bottom: 10px; }
  .panel-link { font-size: 13px; color: #1a6fb5; text-decoration: none; }
  .panel-link:hover { text-decoration: underline; }
  .close-btn { float: right; cursor: pointer; font-size: 18px; color: #888; background: none; border: none; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar input { flex: 1; min-width: 140px; height: 32px; padding: 0 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; }
  .toolbar button { height: 32px; padding: 0 12px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; }
  .toolbar button:hover { background: #f0f0f0; }
  .count-badge { font-size: 12px; color: #666; align-self: center; white-space: nowrap; }
</style>
</head>
<body>
<div id="app">
  <h2>Sclerocactus demography — asset map</h2>
  <div id="status">Loading assets...</div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search by filename..." oninput="applyFilter()" />
    <button onclick="resetMap()">Reset view</button>
    <span class="count-badge" id="countBadge"></span>
  </div>
  <div id="map"></div>
  <div id="panel">
    <button class="close-btn" onclick="closePanel()">×</button>
    <div class="panel-title" id="pTitle"></div>
    <div class="panel-meta" id="pMeta"></div>
    <div class="panel-coords" id="pCoords"></div>
    <a class="panel-link" id="pLink" href="#" target="_blank">View in NetX →</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_BASE = "https://botanicgardens.netx.net";
const API_TOKEN = "NDAyOrnDigHYS3iZAc9ipoldzzB8sqzt";
const FOLDER_ID = 2519;
const HEADERS = {
  "Authorization": "Bearer " + API_TOKEN,
  "Content-Type": "application/json"
};

// DMS string like "39,21.642N" or "108,18.822W" → decimal degrees
function parseDMS(val) {
  if (!val) return null;
  val = String(val).trim();
  const dir = val.slice(-1).toUpperCase();
  const parts = val.slice(0, -1).split(",");
  if (parts.length < 2) return null;
  const deg = parseFloat(parts[0]);
  const min = parseFloat(parts[1]);
  let dd = deg + min / 60;
  if (dir === "S" || dir === "W") dd = -dd;
  return dd;
}

// Try multiple possible GPS field paths in asset metadata
function extractLatLng(asset) {
  const m = asset.metadata || asset.fields || {};

  // Try decimal first
  let lat = parseFloat(m["exif:GPSLatitude"] || m["GPSLatitude"] || "");
  let lng = parseFloat(m["exif:GPSLongitude"] || m["GPSLongitude"] || "");

  // If not decimal, try DMS strings
  if (isNaN(lat) || isNaN(lng)) {
    const rawLat = m["exif:GPSLatitude"] || m["GPSLatitude"] || "";
    const rawLng = m["exif:GPSLongitude"] || m["GPSLongitude"] || "";
    lat = parseDMS(rawLat);
    lng = parseDMS(rawLng);
  }

  if (lat == null || lng == null || isNaN(lat) || isNaN(lng)) return null;
  if (Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;
  return { lat, lng };
}

async function fetchAllAssets() {
  let assets = [], offset = 0, limit = 100;
  while (true) {
    const res = await fetch(`${API_BASE}/api/v1/asset/search`, {
      method: "POST",
      headers: HEADERS,
      body: JSON.stringify({
        query: { folderIds: [FOLDER_ID] },
        offset,
        limit,
        fields: ["id", "name", "filename", "metadata", "fields"]
      })
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    const batch = data.assets || data.results || [];
    assets = assets.concat(batch);
    if (batch.length < limit) break;
    offset += limit;
  }
  return assets;
}

let map, allAssets = [], visibleMarkers = [], markerMap = {};

function initMap() {
  map = L.map("map").setView([39.5, -108.5], 9);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 19
  }).addTo(map);
}

function makeIcon() {
  return L.divIcon({
    className: "",
    html: `<svg width="22" height="30" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg">
      <path d="M11 0C4.9 0 0 4.9 0 11c0 6.6 11 19 11 19S22 17.6 22 11C22 4.9 17.1 0 11 0z" fill="#2d7a4f"/>
      <circle cx="11" cy="11" r="4.5" fill="white"/>
    </svg>`,
    iconSize: [22, 30],
    iconAnchor: [11, 30],
    popupAnchor: [0, -30]
  });
}

function renderMarkers(assets) {
  visibleMarkers.forEach(m => map.removeLayer(m));
  visibleMarkers = [];
  markerMap = {};
  const geoAssets = assets.filter(a => a._latlng);
  geoAssets.forEach(asset => {
    const m = L.marker([asset._latlng.lat, asset._latlng.lng], { icon: makeIcon() });
    m.bindTooltip(asset.filename || asset.name || asset.id, { direction: "top" });
    m.on("click", () => openPanel(asset));
    m.addTo(map);
    visibleMarkers.push(m);
    markerMap[asset.id] = m;
  });
  document.getElementById("countBadge").textContent =
    `${geoAssets.length} of ${assets.length} assets have GPS`;
  if (geoAssets.length > 0) {
    const group = L.featureGroup(visibleMarkers);
    map.fitBounds(group.getBounds().pad(0.2));
  }
}

function openPanel(asset) {
  const ll = asset._latlng;
  document.getElementById("pTitle").textContent = asset.filename || asset.name || asset.id;
  document.getElementById("pMeta").textContent = `Asset ID: ${asset.id}`;
  document.getElementById("pCoords").textContent =
    `${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}`;
  document.getElementById("pLink").href =
    `${API_BASE}/portals/sclerocactusdemography/asset/${asset.id}`;
  document.getElementById("panel").classList.add("open");
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
}

function applyFilter() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = allAssets.filter(a => {
    const name = (a.filename || a.name || "").toLowerCase();
    return !q || name.includes(q);
  });
  renderMarkers(filtered);
}

function resetMap() {
  document.getElementById("search").value = "";
  renderMarkers(allAssets);
}

async function main() {
  initMap();
  try {
    const raw = await fetchAllAssets();
    allAssets = raw.map(a => ({ ...a, _latlng: extractLatLng(a) }));
    const geoCount = allAssets.filter(a => a._latlng).length;
    document.getElementById("status").textContent =
      geoCount > 0
        ? `Found ${raw.length} assets — ${geoCount} have GPS coordinates.`
        : `Found ${raw.length} assets but none had readable GPS metadata. Check field names in the console.`;
    renderMarkers(allAssets);
  } catch (e) {
    document.getElementById("status").textContent = "Error loading assets: " + e.message;
    console.error(e);
  }
}

main();
</script>
</body>
</html>
